<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>GoPick — Assessment Center</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" type="image/x-icon" href="./favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="flex flex-col min-h-screen justify-center items-center">
    <header class="site-header container flex items-center justify-between my-4" role="banner">
      <div class="brand flex items-center gap-4">
        <a href="#" class="brand__logo text-xl font-bold text-slate-900">GoPick</a>
        <button id="navToggle" class="nav-toggle md:hidden p-2 text-slate-700" aria-label="Toggle navigation">☰</button>
      </div>
      <nav id="mainNav" class="site-nav" role="navigation" aria-label="Main navigation">
        <ul class="site-nav__list hidden md:flex space-x-4 text-slate-700">
          <li class="site-nav__item"><a class="hover:underline" href="#hero">Home</a></li>
          <li class="site-nav__item"><a class="hover:underline" href="#features">Features</a></li>
          <li class="site-nav__item"><a class="hover:underline" href="#about">About</a></li>
          <li class="site-nav__item"><a class="hover:underline" href="#contact">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main id="main" class="site-main">
      <section id="hero" class="hero container py-12 md:py-20" aria-labelledby="heroTitle">
        <div class="hero__content max-w-3xl opacity-0 translate-y-3" >
          <h1 id="heroTitle" class="text-3xl md:text-4xl font-extrabold text-slate-900">Loading title...</h1>
          <p id="heroSubtitle" class="mt-4 text-slate-700">Loading subtitle...</p>
          <p class="mt-6"><a id="heroCta" data-cta="primary" class="inline-block bg-sky-600 text-white px-4 py-2 rounded-md" href="#features">Learn more</a></p>
        </div>
      </section>

      <section id="features" class="features container mt-8" aria-labelledby="featuresTitle">
        <h2 id="featuresTitle" class="text-2xl font-semibold text-slate-900">Key Features</h2>
        <ul id="featuresList" class="features__list grid gap-4 grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 mt-4">
          <!-- feature items injected here -->
        </ul>
      </section>

      <section id="about" class="about container mt-8 opacity-0 translate-y-3" aria-labelledby="aboutTitle">
        <h2 id="aboutTitle" class="text-2xl font-semibold text-slate-900">About GoPick</h2>
        <div id="aboutContent" class="mt-3 text-slate-700">Loading about content...</div>
      </section>

      <section id="contact" class="contact container mt-8 opacity-0 translate-y-3" aria-labelledby="contactTitle">
        <h2 id="contactTitle" class="text-2xl font-semibold text-slate-900">Get Help</h2>
        <div id="contactContent" class="mt-3 text-slate-700">Loading contact guidance...</div>
      </section>
    </main>

    <footer class="site-footer container py-8 text-center text-sm text-slate-500">
      <small>&copy; <span id="footerYear"></span> GoPick — Assessment Center</small>
    </footer>

    <script src="assets/js/dataFiller.js" defer></script>
    <script src="assets/js/behavior.js" defer></script>
  </body>
</html>
